chain=liquidregtest
[liquidregtest]
rpcuser=lquser3
rpcpassword=lqpass3
rpcport=12003
port=13003
bind=127.0.0.1
connect=127.0.0.1:13001
connect=127.0.0.1:13002
connect=127.0.0.1:13004
connect=127.0.0.1:13005

daemon=1
listen=1
txindex=1 # enable txindex for electrs
discover=0
listenonion=0
shrinkdebugfile=0

initialfreecoins=2100000000000000
anyonecanspendaremine=1 # enable anyone can spend
fallbackfee=0.000001
creatediscountct=1 # enable discount, otherwise transactions cannot pass minimum fee requirements

validatepegin=0 # disable peg-in, standalone chain not need peg-in and peg-out
fdefaultconsistencychecks=0 # default consistency checks, ensure chain state integrity (usually set to 1 in testing, but set to 0 in production to improve performance)
evbparams=dynafed:0::60:60
con_dyna_deploy_signal=0
con_max_block_sig_size=2000


